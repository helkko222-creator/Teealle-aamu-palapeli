
<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teealle ❤️ Haastava Rakkauspeli</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#1d0f1c;color:#fff;padding:15px}
.card{max-width:700px;margin:auto;background:rgba(255,255,255,.08);padding:20px;border-radius:20px}
button,.tile{padding:14px;border-radius:12px;border:none;margin:6px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:#fff;color:#222;font-weight:bold}
.ok{background:#8cffb2!important}
.bad{background:#ff8c8c!important}
#msg{margin-top:15px;font-weight:bold}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card" id="game"></div>

<script>
let stage=0;

function render(){
const g=document.getElementById("game");

if(stage===0){
g.innerHTML=`<h2>❤️ Salainen Viesti</h2>
<p>Valitse sanat oikeassa järjestyksessä muodostaaksesi lauseen.</p>
<div class="grid">
<div class="tile" onclick="pick(this,'aina')">aina</div>
<div class="tile" onclick="pick(this,'sinut')">sinut</div>
<div class="tile" onclick="pick(this,'valitsen')">valitsen</div>
<div class="tile" onclick="pick(this,'minä')">minä</div>
</div>
<div id="msg"></div>`;
window.answer=[];
}
else if(stage===1){
g.innerHTML=`<h2>🧩 Muistipeli</h2>
<p>Etsi kolme paria. Tämä on vaikeampi kuin tavallinen muistipeli.</p>
<div class="grid" id="memory"></div><div id="msg"></div>`;
memoryGame();
}
else if(stage===2){
g.innerHTML=`<h2>🔐 Koodinmurto</h2>
<p>Arvaa nelinumeroinen koodi. Vihje: sydämiä on kahdessa parissa ❤️❤️</p>
<input id="code" maxlength="4" style="font-size:24px;width:120px">
<button onclick="checkCode()">Tarkista</button>
<div id="msg"></div>`;
}
else{
g.innerHTML=`<h1>❤️ Voitit!</h1>
<p>Tämä versio sisältää vaikeampia tehtäviä ja toimii hyvin puhelimella.</p>
<p><b>Minä valitsen sinut aina.</b></p>`;
}
}

function pick(el,w){
answer.push(w);
el.classList.add('ok');
if(answer.length===4){
if(answer.join(' ')==='minä valitsen sinut aina'){
document.getElementById('msg').innerHTML='Oikein!';
setTimeout(()=>{stage++;render();},1000);
}else{
document.getElementById('msg').innerHTML='Väärä järjestys, yritä uudelleen.';
answer=[];
document.querySelectorAll('.tile').forEach(t=>t.classList.remove('ok'));
}
}
}

function memoryGame(){
const vals=['A','A','B','B','C','C'].sort(()=>Math.random()-0.5);
const mem=document.getElementById('memory');
let first=null,lock=false,pairs=0;
vals.forEach(v=>{
const d=document.createElement('div');
d.className='tile';
d.textContent='?';
d.onclick=()=>{
if(lock||d.dataset.done)return;
d.textContent=v;
if(!first){first={d,v};return;}
if(first.v===v){
d.dataset.done=1; first.d.dataset.done=1; pairs++;
first=null;
if(pairs===3){document.getElementById('msg').innerHTML='Läpäisty!';setTimeout(()=>{stage++;render();},1000);}
}else{
lock=true;
setTimeout(()=>{
d.textContent='?';
first.d.textContent='?';
first=null;
lock=false;
},700);
}
};
mem.appendChild(d);
});
}

function checkCode(){
const v=document.getElementById('code').value;
if(v==='2244'){
document.getElementById('msg').innerHTML='Koodi oikein!';
setTimeout(()=>{stage++;render();},1000);
}else{
document.getElementById('msg').innerHTML='Väärä koodi.';
}
}

render();
</script>
</body>
</html>
