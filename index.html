<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teealle ❤️</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.28), transparent 32%),
        linear-gradient(135deg, #2b061e, #6d123f 45%, #b83262);
      color: white;
      overflow-x: hidden;
    }

    .heart-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      top: -10vh;
      color: rgba(255, 205, 220, 0.9);
      animation: fall linear infinite;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translateY(115vh) rotate(360deg);
        opacity: 0;
      }
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .card {
      width: min(720px, 100%);
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      text-align: center;
      animation: appear 0.7s ease both;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .small-title {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.82rem;
      opacity: 0.82;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      margin: 0 0 16px;
      line-height: 1;
    }

    h2 {
      font-size: clamp(1.8rem, 5vw, 3.1rem);
      margin: 0 0 16px;
    }

    p {
      font-size: clamp(1.08rem, 2.5vw, 1.35rem);
      line-height: 1.7;
      margin: 14px 0;
    }

    .love-line {
      color: #ffe1eb;
      font-style: italic;
    }

    .question-box {
      margin-top: 28px;
      padding: 22px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
    }

    label {
      display: block;
      font-size: 1.08rem;
      margin-bottom: 12px;
      color: #ffe7ef;
    }

    input {
      width: 100%;
      padding: 15px 17px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      outline: none;
      text-align: center;
      background: rgba(255, 255, 255, 0.95);
      color: #4d062b;
    }

    button {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: bold;
      color: #6d123f;
      background: linear-gradient(135deg, #fff0f5, #ffc2d5);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.32);
    }

    .feedback {
      min-height: 28px;
      margin-top: 14px;
      color: #ffd5e3;
      font-size: 1rem;
    }

    .hidden {
      display: none;
    }

    .progress {
      margin-top: 18px;
      font-size: 0.92rem;
      opacity: 0.8;
    }

    .final-heart {
      font-size: 4rem;
      animation: pulse 1.3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.13); }
    }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 0.9s ease-out forwards;
      z-index: 3;
    }

    @keyframes sparkle {
      from {
        opacity: 1;
        transform: scale(0.2);
      }
      to {
        opacity: 0;
        transform: translateY(-38px) scale(1.7);
      }
    }
  </style>
</head>
<body>
  <div class="heart-rain" id="heartRain"></div>

  <main class="page">
    <section class="card" id="card">
      <div class="small-title">Vain Teealle</div>
      <h1>Hei rakas ❤️</h1>
      <p>
        Tein sinulle pienen rakkauspelin, koska välillä sanat eivät vain riitä kertomaan,
        kuinka paljon merkitset minulle.
      </p>
      <p class="love-line">
        Jokaisen kysymyksen takana on pieni pala meidän tarinaa.
      </p>
      <button onclick="startGame()">Aloita matka</button>
    </section>
  </main>

  <script>
    const pages = [
      {
        title: "Ensimmäinen muisto",
        text: "Muistan sen hetken, kun kaikki alkoi tuntua vielä enemmän meiltä. Joissain hetkissä maailma vain hiljenee ympäriltä ja jäljelle jää vain toinen ihminen.",
        question: "Missä suudeltiin ensimmäisen kerran?",
        answer: "vaarniemi",
        hint: "Vihje: paikka korkealla, jossa maisema oli kaunis."
      },
      {
        title: "Meidän ensimmäinen leffailta",
        text: "Ei sillä ole edes väliä, oliko elokuva täydellinen. Tärkeintä oli se, että katsoin sitä sinun kanssasi. Sinun vieressäsi tavallisestakin illasta tulee muisto.",
        question: "Mikä leffa katsottiin ensimmäisen kerran?",
        answer: "red one",
        hint: "Vihje: siinä oli joulua, toimintaa ja meidän ensimmäinen yhteinen leffahetki."
      },
      {
        title: "Kaikki puolet minusta",
        text: "Rakastan sitä, että vaikka minussa on vaikeitakin puolia, sinä olet nähnyt minut kokonaisena. Et vain hyvinä hetkinä, vaan myös silloin kun pääni käy liian kovaa.",
        question: "Mikä sinussa ärsyttää minussa?",
        answer: "adhd",
        hint: "Vihje: se liittyy minun levottomaan päähäni."
      },
      {
        title: "Meidän pieni kuorsaaja",
        text: "Meidän kodissa on rakkautta, naurua ja välillä aika äänekästä unta. Silti en vaihtaisi sitä mihinkään, koska se on meidän oma pieni maailma.",
        question: "Kuka kuorsaa eniten meidän taloudessa?",
        answer: "fami",
        hint: "Vihje: pieni koko, iso ääni."
      }
    ];

    let currentPage = 0;

    function normalize(text) {
      return text
        .toLowerCase()
        .trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function startGame() {
      currentPage = 0;
      renderPage();
    }

    function renderPage() {
      const item = pages[currentPage];
      const card = document.getElementById("card");

      card.innerHTML = `
        <div class="small-title">Sivu ${currentPage + 1} / ${pages.length}</div>
        <h2>${item.title} ❤️</h2>
        <p>${item.text}</p>
        <div class="question-box">
          <label>${item.question}</label>
          <input id="answerInput" type="text" placeholder="Kirjoita vastaus tähän..." autocomplete="off" />
          <button onclick="checkAnswer()">Avaa seuraava sivu</button>
          <div class="feedback" id="feedback"></div>
        </div>
        <div class="progress">Vastaa oikein, niin seuraava pala avautuu.</div>
      `;

      setTimeout(() => document.getElementById("answerInput").focus(), 100);

      document.getElementById("answerInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          checkAnswer();
        }
      });
    }

    function checkAnswer() {
      const item = pages[currentPage];
      const input = document.getElementById("answerInput");
      const feedback = document.getElementById("feedback");
      const userAnswer = normalize(input.value);
      const correctAnswer = normalize(item.answer);

      if (userAnswer === correctAnswer) {
        createSparkles();
        feedback.textContent = "Oikein, rakas ❤️";

        setTimeout(() => {
          currentPage++;
          if (currentPage < pages.length) {
            renderPage();
          } else {
            renderFinalPage();
          }
        }, 850);
      } else {
        feedback.textContent = "Ei ihan, rakas. " + item.hint;
        input.value = "";
        input.focus();
      }
    }

    function renderFinalPage() {
      const card = document.getElementById("card");
      card.innerHTML = `
        <div class="small-title">Viimeinen salaisuus</div>
        <div class="final-heart">❤️</div>
        <h2>Teea, minä rakastan sinua.</h2>
        <p>
          Rakastan sinua meidän hyvissä hetkissä, vaikeissa hetkissä, naurussa,
          hiljaisuudessa, arjessa ja kaikessa siinä mitä me ollaan yhdessä rakennettu.
        </p>
        <p>
          Sinä olet minulle koti, turva, rakkaus ja se ihminen, jonka kanssa haluan jatkaa tätä matkaa.
        </p>
        <p class="love-line">
          Kiitos, että olet minun Teea. Aina. ❤️
        </p>
        <button onclick="startGame()">Lue uudelleen</button>
      `;
      createSparkles();
    }

    function createHeartRain() {
      const container = document.getElementById("heartRain");
      const hearts = ["❤️", "💕", "💗", "💖", "💘", "🌹"];

      for (let i = 0; i < 42; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 14 + Math.random() * 26 + "px";
        heart.style.animationDuration = 7 + Math.random() * 9 + "s";
        heart.style.animationDelay = Math.random() * 9 + "s";
        container.appendChild(heart);
      }
    }

    function createSparkles() {
      for (let i = 0; i < 22; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = 20 + Math.random() * 60 + "vw";
        sparkle.style.top = 25 + Math.random() * 50 + "vh";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 900);
      }
    }

    createHeartRain();
  </script>
</body>
</html>
