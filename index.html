<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teealle ❤️</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.28), transparent 32%),
        linear-gradient(135deg, #2b061e, #6d123f 45%, #b83262);
      color: white;
      overflow-x: hidden;
    }

    .heart-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      top: -10vh;
      color: rgba(255, 205, 220, 0.9);
      animation: fall linear infinite;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translateY(115vh) rotate(360deg);
        opacity: 0;
      }
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .card {
      width: min(760px, 100%);
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      text-align: center;
      animation: appear 0.7s ease both;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .small-title {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.82rem;
      opacity: 0.82;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      margin: 0 0 16px;
      line-height: 1;
    }

    h2 {
      font-size: clamp(1.8rem, 5vw, 3.1rem);
      margin: 0 0 16px;
    }

    p {
      font-size: clamp(1.08rem, 2.5vw, 1.35rem);
      line-height: 1.7;
      margin: 14px 0;
    }

    .love-line {
      color: #ffe1eb;
      font-style: italic;
    }

    .game-box {
      margin-top: 28px;
      padding: 22px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
    }

    button {
      margin: 10px;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: bold;
      color: #6d123f;
      background: linear-gradient(135deg, #fff0f5, #ffc2d5);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.32);
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 15px 17px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      outline: none;
      text-align: center;
      background: rgba(255, 255, 255, 0.95);
      color: #4d062b;
      margin-top: 10px;
    }

    .feedback {
      min-height: 28px;
      margin-top: 14px;
      color: #ffd5e3;
      font-size: 1rem;
    }

    .progress {
      margin-top: 18px;
      font-size: 0.92rem;
      opacity: 0.8;
    }

    .final-heart {
      font-size: 4rem;
      animation: pulse 1.3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.13); }
    }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 0.9s ease-out forwards;
      z-index: 3;
    }

    @keyframes sparkle {
      from {
        opacity: 1;
        transform: scale(0.2);
      }
      to {
        opacity: 0;
        transform: translateY(-38px) scale(1.7);
      }
    }

    .big-heart-button {
      font-size: 3rem;
      width: 110px;
      height: 110px;
      padding: 0;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .choice-grid button {
      margin: 0;
      min-height: 70px;
      font-size: 1.5rem;
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px auto 0;
      max-width: 430px;
    }

    .memory-card {
      height: 72px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.25);
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 520px) {
      .choice-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .memory-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .card {
        padding: 24px 18px;
      }
    }
  </style>
</head>

<body>
  <div class="heart-rain" id="heartRain"></div>

  <main class="page">
    <section class="card" id="card">
      <div class="small-title">Vain Teealle</div>
      <h1>Hei rakas ❤️</h1>
      <p>
        Tein sinulle pienen rakkausmatkan. Jokaisen sivun takana on pieni peli
        ja jokaisen pelin takana yksi uusi ajatus siitä, miksi olet minulle niin tärkeä.
      </p>
      <p class="love-line">
        Pelaa eteenpäin, niin avaat seuraavan viestin.
      </p>
      <button onclick="startGame()">Aloita matka</button>
    </section>
  </main>

  <script>
    const pages = [
      {
        title: "Sydämeni valitsee sinut",
        text: "Jokainen pieni hetki sinun kanssasi muistuttaa minua siitä, että rakkaus ei ole vain isoja sanoja. Se on arkea, katseita, naurua ja sitä tunnetta, että toinen on koti.",
        game: "heartClick"
      },
      {
        title: "Kaikkien joukosta sinä",
        text: "Maailmassa on paljon ihmisiä, mutta minulle sinä et ole vain yksi muiden joukossa. Sinä olet se oikea sydän, jonka tunnistaisin aina.",
        game: "findHeart"
      },
      {
        title: "Meidän sana",
        text: "On yksi sana, joka ei yksin riitä kuvaamaan kaikkea, mutta se tulee lähimmäksi. Se sana on se, mitä tunnen sinua kohtaan joka päivä.",
        game: "secretWord",
        answer: "rakkaus"
      },
      {
        title: "Muistan meidät",
        text: "Rakastan sitä, että meillä on oma pieni maailmamme. Kaikki muistot, hassut hetket ja tavallinen arki ovat minulle tärkeitä, koska ne ovat meidän.",
        game: "memoryGame"
      }
    ];

    let currentPage = 0;
    let heartCount = 0;
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let matchedPairs = 0;

    function startGame() {
      currentPage = 0;
      heartCount = 0;
      renderPage();
    }

    function renderPage() {
      const item = pages[currentPage];
      const card = document.getElementById("card");

      card.innerHTML = `
        <div class="small-title">Sivu ${currentPage + 1} / ${pages.length}</div>
        <h2>${item.title} ❤️</h2>
        <p>${item.text}</p>
        <div class="game-box" id="gameBox"></div>
        <div class="progress">Ratkaise pieni peli, niin seuraava viesti avautuu.</div>
      `;

      if (item.game === "heartClick") {
        renderHeartClickGame();
      }

      if (item.game === "findHeart") {
        renderFindHeartGame();
      }

      if (item.game === "secretWord") {
        renderSecretWordGame();
      }

      if (item.game === "memoryGame") {
        renderMemoryGame();
      }
    }

    function renderHeartClickGame() {
      heartCount = 0;
      const gameBox = document.getElementById("gameBox");

      gameBox.innerHTML = `
        <p>Klikkaa sydäntä 7 kertaa.</p>
        <button class="big-heart-button" onclick="clickBigHeart()">❤️</button>
        <div class="feedback" id="heartCounter">0 / 7</div>
      `;
    }

    function clickBigHeart() {
      heartCount++;
      document.getElementById("heartCounter").textContent = heartCount + " / 7";
      createSparkles();

      if (heartCount >= 7) {
        setTimeout(nextPage, 600);
      }
    }

    function renderFindHeartGame() {
      const gameBox = document.getElementById("gameBox");

      gameBox.innerHTML = `
        <p>Löydä oikea sydän särkyneiden sydänten joukosta.</p>
        <div class="choice-grid">
          <button onclick="wrongChoice()">💔</button>
          <button onclick="wrongChoice()">💔</button>
          <button onclick="wrongChoice()">💔</button>
          <button onclick="wrongChoice()">💔</button>
          <button onclick="nextPage()">❤️</button>
          <button onclick="wrongChoice()">💔</button>
        </div>
        <div class="feedback" id="feedback"></div>
      `;
    }

    function renderSecretWordGame() {
      const gameBox = document.getElementById("gameBox");

      gameBox.innerHTML = `
        <p>Kirjoita sana, joka kuvaa meitä.</p>
        <input id="answerInput" type="text" placeholder="Kirjoita sana tähän..." autocomplete="off" />
        <br>
        <button onclick="checkSecretWord()">Avaa seuraava sivu</button>
        <div class="feedback" id="feedback"></div>
      `;

      setTimeout(() => document.getElementById("answerInput").focus(), 100);

      document.getElementById("answerInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          checkSecretWord();
        }
      });
    }

    function checkSecretWord() {
      const item = pages[currentPage];
      const input = document.getElementById("answerInput");
      const feedback = document.getElementById("feedback");

      if (normalize(input.value) === normalize(item.answer)) {
        feedback.textContent = "Oikein, rakas ❤️";
        createSparkles();
        setTimeout(nextPage, 700);
      } else {
        feedback.textContent = "Ei ihan. Vihje: se alkaa r-kirjaimella ❤️";
        input.value = "";
        input.focus();
      }
    }

    function renderMemoryGame() {
      const gameBox = document.getElementById("gameBox");

      firstCard = null;
      secondCard = null;
      lockBoard = false;
      matchedPairs = 0;

      const symbols = ["❤️", "❤️", "🌹", "🌹", "💍", "💍", "🐶", "🐶"];
      const shuffled = symbols.sort(() => Math.random() - 0.5);

      let cardsHTML = "";

      shuffled.forEach((symbol, index) => {
        cardsHTML += `
          <div class="memory-card" data-symbol="${symbol}" data-index="${index}" onclick="flipCard(this)">?</div>
        `;
      });

      gameBox.innerHTML = `
        <p>Löydä kaikki parit.</p>
        <div class="memory-grid">
          ${cardsHTML}
        </div>
        <div class="feedback" id="feedback">Parit löydetty: 0 / 4</div>
      `;
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card.classList.contains("matched")) return;
      if (card === firstCard) return;

      card.textContent = card.dataset.symbol;

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      lockBoard = true;

      if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        matchedPairs++;

        document.getElementById("feedback").textContent = "Parit löydetty: " + matchedPairs + " / 4";
        createSparkles();

        firstCard = null;
        secondCard = null;
        lockBoard = false;

        if (matchedPairs === 4) {
          setTimeout(nextPage, 900);
        }
      } else {
        setTimeout(() => {
          firstCard.textContent = "?";
          secondCard.textContent = "?";
          firstCard = null;
          secondCard = null;
          lockBoard = false;
        }, 850);
      }
    }

    function wrongChoice() {
      const feedback = document.getElementById("feedback");
      feedback.textContent = "Ei tuo, rakas. Kokeile uudelleen ❤️";
    }

    function nextPage() {
      createSparkles();
      currentPage++;

      if (currentPage < pages.length) {
        renderPage();
      } else {
        renderFinalPage();
      }
    }

    function renderFinalPage() {
      const card = document.getElementById("card");

      card.innerHTML = `
        <div class="small-title">Viimeinen viesti</div>
        <div class="final-heart">❤️</div>
        <h2>Teea, minä rakastan sinua.</h2>
        <p>
          Rakastan sinua silloinkin, kun arki on raskasta. Rakastan sinua silloin,
          kun nauretaan tyhmille jutuille. Rakastan sinua hiljaisissa hetkissä,
          kiireessä, unelmissa ja kaikessa siinä, mitä me yhdessä rakennetaan.
        </p>
        <p>
          Sinä olet minulle enemmän kuin puoliso. Olet paras ystäväni, kotini,
          turvani ja se ihminen, jonka kanssa haluan mennä eteenpäin.
        </p>
        <p class="love-line">
          Kiitos, että olet minun Teea. Valitsisin sinut aina uudelleen. ❤️
        </p>
        <button onclick="startGame()">Pelaa uudelleen</button>
      `;

      createSparkles();
    }

    function normalize(text) {
      return text
        .toLowerCase()
        .trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function createHeartRain() {
      const container = document.getElementById("heartRain");
      const hearts = ["❤️", "💕", "💗", "💖", "💘", "🌹"];

      for (let i = 0; i < 42; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 14 + Math.random() * 26 + "px";
        heart.style.animationDuration = 7 + Math.random() * 9 + "s";
        heart.style.animationDelay = Math.random() * 9 + "s";
        container.appendChild(heart);
      }
    }

    function createSparkles() {
      for (let i = 0; i < 22; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = 20 + Math.random() * 60 + "vw";
        sparkle.style.top = 25 + Math.random() * 50 + "vh";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 900);
      }
    }

    createHeartRain();
  </script>
</body>
</html>
