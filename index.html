<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teealle ❤️ Olen tässä</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --dark: #240018;
      --mid: #6d1644;
      --pink: #c73d72;
      --soft: #ffe2ec;
      --whiteGlass: rgba(255,255,255,0.14);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.24), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,205,225,0.24), transparent 32%),
        linear-gradient(135deg, var(--dark), var(--mid) 48%, var(--pink));
      color: white;
      overflow-x: hidden;
    }

    .heart-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      top: -10vh;
      animation: fall linear infinite;
      text-shadow: 0 0 12px rgba(255,255,255,0.45);
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 14px;
    }

    .card {
      width: min(900px, 100%);
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.36);
      backdrop-filter: blur(16px);
      text-align: center;
      animation: appear 0.65s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .small-title {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.8rem;
      opacity: 0.84;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2.15rem, 7vw, 4.1rem);
      margin: 0 0 16px;
      line-height: 1;
    }

    h2 {
      font-size: clamp(1.7rem, 5vw, 2.9rem);
      margin: 0 0 16px;
    }

    p {
      font-size: clamp(1.03rem, 2.6vw, 1.25rem);
      line-height: 1.68;
    }

    .love-line {
      color: var(--soft);
      font-style: italic;
    }

    .game-box {
      margin-top: 24px;
      padding: 22px;
      border-radius: 24px;
      background: var(--whiteGlass);
    }

    button {
      margin: 8px;
      border: none;
      border-radius: 999px;
      padding: 13px 21px;
      font-size: 1rem;
      font-weight: bold;
      color: #68123e;
      background: linear-gradient(135deg, #fff1f7, #ffc4d7);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.23);
      transition: transform 0.16s ease, opacity 0.16s ease;
      touch-action: manipulation;
    }

    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .feedback {
      min-height: 30px;
      margin-top: 14px;
      color: #ffd5e3;
      font-size: 1rem;
      font-weight: bold;
    }

    .progress {
      margin-top: 18px;
      font-size: 0.92rem;
      opacity: 0.82;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .choice {
      border-radius: 20px;
      background: rgba(255,255,255,0.9);
      color: #68123e;
      padding: 16px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      min-height: 78px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
    }

    .choice.selected {
      outline: 4px solid #ffe2ec;
      background: #ffc8da;
    }

    .tap-area {
      position: relative;
      width: 100%;
      max-width: 650px;
      height: 360px;
      margin: 18px auto;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.92);
      color: #68123e;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      animation: bubbleFloat 1.8s ease-in-out infinite alternate;
      box-shadow: 0 9px 20px rgba(0,0,0,0.22);
    }

    @keyframes bubbleFloat {
      from { transform: translateY(0); }
      to { transform: translateY(-9px); }
    }

    .memory-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 18px 0;
    }

    .tile {
      width: 128px;
      min-height: 82px;
      border-radius: 20px;
      background: rgba(255,255,255,0.9);
      color: #68123e;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }

    .tile.done {
      background: #ffd7e5;
      opacity: 0.65;
      pointer-events: none;
    }

    .slider-wrap {
      margin: 24px auto 6px;
      max-width: 560px;
      background: rgba(255,255,255,0.13);
      border-radius: 24px;
      padding: 20px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #ffe2ec;
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      opacity: 0.85;
      margin-top: 8px;
    }

    .final-heart {
      font-size: 4rem;
      animation: pulse 1.25s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 0.9s ease-out forwards;
      z-index: 3;
    }

    @keyframes sparkle {
      from { opacity: 1; transform: scale(0.2); }
      to { opacity: 0; transform: translateY(-38px) scale(1.7); }
    }

    @media (max-width: 650px) {
      .card { padding: 24px 17px; border-radius: 26px; }
      .game-box { padding: 18px 12px; }
      .choice-grid { grid-template-columns: 1fr; }
      .tap-area { height: 360px; }
      .bubble { font-size: 0.92rem; padding: 9px 11px; }
      .tile { width: 46%; min-height: 76px; font-size: 0.9rem; }
      button { width: calc(100% - 16px); max-width: 360px; }
    }
  </style>
</head>

<body>
  <div class="heart-rain" id="heartRain"></div>

  <main class="page">
    <section class="card" id="card">
      <div class="small-title">Teealle</div>
      <h1>Hei rakas ❤️</h1>
      <p>
        Tein sinulle uuden pienen haasteen. Tällä kertaa tämä ei ole vain peli,
        vaan myös tapa sanoa jotain, mitä en ole ehkä osannut sanoa tarpeeksi hyvin ääneen.
      </p>
      <p class="love-line">
        Olen pahoillani, että en ole ollut viime aikoina niin läsnä kuin olisit ansainnut.
      </p>
      <button onclick="startGame()">Aloita haaste</button>
    </section>
  </main>

  <script>
    const pages = [
      {
        title: "Valitse mitä haluan opetella",
        text: "Kun sinulle tulee turvaton olo, minun ei kuulu suuttua tai mennä lukkoon. Minun pitää opetella pysähtymään ja näkemään, että sen tunteen alla on tarve tulla rakastetuksi ja turvatuksi.",
        game: "choice"
      },
      {
        title: "Kerää hyvät sanat",
        text: "Haluan antaa sinulle enemmän sellaisia sanoja, jotka eivät puolustaudu, vaan tulevat lähelle.",
        game: "tapWords"
      },
      {
        title: "Yhdistä rauhoittavat parit",
        text: "Kaikki ei ratkea yhdellä lauseella. Mutta minä voin opetella vastaamaan tavalla, joka rakentaa meitä eikä riko meitä.",
        game: "pairs"
      },
      {
        title: "Säädä läsnäolo kohdalleen",
        text: "Minun ei tarvitse olla täydellinen. Mutta minun pitää olla enemmän tässä. Sinun vierelläsi, ei omissa muureissani.",
        game: "slider"
      }
    ];

    let currentPage = 0;
    let selectedChoice = null;
    let tapScore = 0;
    let tapTimer = null;
    let pairFirst = null;
    let pairsFound = 0;

    function startGame() {
      currentPage = 0;
      renderPage();
    }

    function renderPage() {
      clearInterval(tapTimer);
      selectedChoice = null;
      pairFirst = null;
      pairsFound = 0;

      const item = pages[currentPage];
      const card = document.getElementById("card");

      card.innerHTML = `
        <div class="small-title">Sivu ${currentPage + 1} / ${pages.length}</div>
        <h2>${item.title} ❤️</h2>
        <p>${item.text}</p>
        <div class="game-box" id="gameBox"></div>
        <div class="progress">Ratkaise tehtävä, niin seuraava viesti aukeaa.</div>
      `;

      if (item.game === "choice") renderChoiceGame();
      if (item.game === "tapWords") renderTapWordsGame();
      if (item.game === "pairs") renderPairsGame();
      if (item.game === "slider") renderSliderGame();
    }

    function renderChoiceGame() {
      const options = [
        { text: "Kuunnella ensin, en puolustautua", good: true },
        { text: "Muistaa, että turvattomuus ei ole hyökkäys", good: true },
        { text: "Sanoa että kaikki on sinun vika", good: false },
        { text: "Olla läsnä myös silloin kun minua ahdistaa", good: true }
      ];

      let html = "";
      options.forEach((option, index) => {
        html += `<div class="choice" onclick="chooseOption(${index}, this)" data-good="${option.good}">${option.text}</div>`;
      });

      document.getElementById("gameBox").innerHTML = `
        <p>Valitse kaikki asiat, joita haluan oikeasti opetella.</p>
        <div class="choice-grid">${html}</div>
        <button onclick="checkChoices()">Tarkista</button>
        <div class="feedback" id="feedback"></div>
      `;
    }

    function chooseOption(index, element) {
      element.classList.toggle("selected");
    }

    function checkChoices() {
      const choices = document.querySelectorAll(".choice");
      let correct = true;

      choices.forEach(choice => {
        const shouldBeSelected = choice.dataset.good === "true";
        const isSelected = choice.classList.contains("selected");
        if (shouldBeSelected !== isSelected) correct = false;
      });

      if (correct) {
        document.getElementById("feedback").textContent = "Juuri näin. Haluan oppia tulemaan lähemmäs, en kauemmas ❤️";
        createSparkles();
        setTimeout(nextPage, 1000);
      } else {
        document.getElementById("feedback").textContent = "Melkein. Mukaan kuuluu kaikki mikä lisää turvaa, ei mikään mikä syyttää ❤️";
      }
    }

    function renderTapWordsGame() {
      tapScore = 0;

      document.getElementById("gameBox").innerHTML = `
        <p>Napauta viittä hyvää sanaa, jotka haluan antaa sinulle useammin.</p>
        <div class="tap-area" id="tapArea"></div>
        <div class="feedback" id="feedback">Kerätty: 0 / 5</div>
        <button id="tapStart" onclick="startTapWords()">Aloita</button>
      `;
    }

    function startTapWords() {
      const startButton = document.getElementById("tapStart");
      if (startButton) startButton.disabled = true;

      const area = document.getElementById("tapArea");
      area.innerHTML = "";

      const words = [
        { text: "olen tässä", good: true },
        { text: "kuuntelen", good: true },
        { text: "rakastan", good: true },
        { text: "en lähde pois", good: true },
        { text: "sinä riität", good: true },
        { text: "älä nyt taas", good: false },
        { text: "ei tästä mitään", good: false },
        { text: "antaa olla", good: false }
      ];

      words.sort(() => Math.random() - 0.5).forEach((word, index) => {
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = word.text;
        bubble.dataset.good = word.good;
        bubble.style.left = Math.random() * 68 + "%";
        bubble.style.top = (8 + Math.random() * 72) + "%";
        bubble.style.animationDelay = (index * 0.08) + "s";
        bubble.onclick = () => tapBubble(bubble);
        area.appendChild(bubble);
      });
    }

    function tapBubble(bubble) {
      if (bubble.dataset.good === "true") {
        tapScore++;
        bubble.remove();
        createSparkles();
        document.getElementById("feedback").textContent = "Kerätty: " + tapScore + " / 5";

        if (tapScore >= 5) {
          document.getElementById("feedback").textContent = "Nämä sanat haluan muistaa myös arjessa ❤️";
          setTimeout(nextPage, 1000);
        }
      } else {
        document.getElementById("feedback").textContent = "Tuo ei ole se suunta. Valitsen pehmeämmän tavan vastata ❤️";
        bubble.remove();
      }
    }

    function renderPairsGame() {
      pairsFound = 0;
      pairFirst = null;

      const tiles = [
        { id: "turva", text: "Kun sinua pelottaa" },
        { id: "turva", text: "minä pysähdyn kuuntelemaan" },
        { id: "läsnä", text: "Kun olen ollut poissaoleva" },
        { id: "läsnä", text: "minä tulen takaisin lähelle" },
        { id: "katse", text: "Kun katseeni satuttaa" },
        { id: "katse", text: "en vähättele sinun tunnetta" },
        { id: "me", text: "Kun meillä on vaikeaa" },
        { id: "me", text: "valitsen silti meidät" }
      ];

      tiles.sort(() => Math.random() - 0.5);

      let html = "";
      tiles.forEach((tile, index) => {
        html += `<div class="tile" onclick="choosePair(this)" data-id="${tile.id}">${tile.text}</div>`;
      });

      document.getElementById("gameBox").innerHTML = `
        <p>Yhdistä asiat, jotka kuuluvat yhteen.</p>
        <div class="memory-row">${html}</div>
        <div class="feedback" id="feedback">Löydetty: 0 / 4</div>
      `;
    }

    function choosePair(tile) {
      if (tile.classList.contains("done")) return;

      if (!pairFirst) {
        pairFirst = tile;
        tile.classList.add("selected");
        tile.style.outline = "4px solid #ffe2ec";
        return;
      }

      if (pairFirst === tile) return;

      if (pairFirst.dataset.id === tile.dataset.id) {
        pairFirst.classList.add("done");
        tile.classList.add("done");
        pairFirst.style.outline = "none";
        tile.style.outline = "none";
        pairFirst = null;
        pairsFound++;
        createSparkles();
        document.getElementById("feedback").textContent = "Löydetty: " + pairsFound + " / 4";

        if (pairsFound >= 4) {
          document.getElementById("feedback").textContent = "Nämä parit haluan muistaa myös silloin kun on vaikeaa ❤️";
          setTimeout(nextPage, 1100);
        }
      } else {
        const old = pairFirst;
        pairFirst = null;
        tile.style.outline = "4px solid rgba(255,255,255,0.5)";
        setTimeout(() => {
          old.style.outline = "none";
          tile.style.outline = "none";
        }, 650);
      }
    }

    function renderSliderGame() {
      document.getElementById("gameBox").innerHTML = `
        <p>Vedä läsnäolon säädin loppuun asti.</p>
        <div class="slider-wrap">
          <input type="range" min="0" max="100" value="0" id="presenceSlider" oninput="checkSlider()" />
          <div class="range-labels">
            <span>Poissa mielessä</span>
            <span>Tässä sinun kanssa</span>
          </div>
        </div>
        <div class="feedback" id="feedback">Läsnäolo: 0%</div>
      `;
    }

    function checkSlider() {
      const slider = document.getElementById("presenceSlider");
      const value = Number(slider.value);
      document.getElementById("feedback").textContent = "Läsnäolo: " + value + "%";

      if (value >= 98) {
        slider.disabled = true;
        document.getElementById("feedback").textContent = "Tässä minä haluan olla. Sinun lähelläsi ❤️";
        createSparkles();
        setTimeout(nextPage, 1000);
      }
    }

    function nextPage() {
      clearInterval(tapTimer);
      currentPage++;

      if (currentPage < pages.length) {
        renderPage();
      } else {
        renderFinalPage();
      }
    }

    function renderFinalPage() {
      const card = document.getElementById("card");
      card.innerHTML = `
        <div class="small-title">Haaste läpäisty</div>
        <div class="final-heart">❤️</div>
        <h2>Teea, anteeksi.</h2>
        <p>
          Anteeksi, että en ole ollut viime aikoina niin läsnä kuin sinun olisi tarvinnut.
          Anteeksi myös siitä, että kun sinulle tulee turvaton olo minun katseeni takia,
          minä en ole aina osannut reagoida tavalla, joka rauhoittaa sinua.
        </p>
        <p>
          Minä en halua vähätellä sinun tunnetta. En halua, että sinä jäät yksin sen kanssa.
          Minä haluan opetella pysähtymään, kuuntelemaan ja vastaamaan niin, että sinulle tulee olo:
          minä olen tässä, minä valitsen sinut, eikä sinun tarvitse taistella yksin.
        </p>
        <p class="love-line">
          Sinä olet minulle rakas. Ei vain hyvinä päivinä, vaan myös silloin kun meidän pitää opetella uudestaan,
          miten tullaan toistemme luo. Minä rakastan sinua. ❤️
        </p>
        <button onclick="startGame()">Pelaa uudelleen</button>
      `;
      createSparkles();
    }

    function createHeartRain() {
      const container = document.getElementById("heartRain");
      const hearts = ["❤️", "💕", "💗", "💖", "💘", "🌹"];

      for (let i = 0; i < 44; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 13 + Math.random() * 25 + "px";
        heart.style.animationDuration = 7 + Math.random() * 9 + "s";
        heart.style.animationDelay = Math.random() * 9 + "s";
        container.appendChild(heart);
      }
    }

    function createSparkles() {
      for (let i = 0; i < 24; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = 20 + Math.random() * 60 + "vw";
        sparkle.style.top = 25 + Math.random() * 50 + "vh";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 900);
      }
    }

    createHeartRain();
  </script>
</body>
</html>
