<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teealle ❤️ Uusi haaste</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.26), transparent 32%),
        linear-gradient(135deg, #22031a, #64103d 45%, #b83262);
      color: white;
      overflow-x: hidden;
    }

    .heart-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      top: -10vh;
      animation: fall linear infinite;
      text-shadow: 0 0 12px rgba(255,255,255,0.45);
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .card {
      width: min(850px, 100%);
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.38);
      backdrop-filter: blur(16px);
      text-align: center;
      animation: appear 0.7s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .small-title {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.82rem;
      opacity: 0.82;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 4.2rem);
      margin: 0 0 16px;
      line-height: 1;
    }

    h2 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      margin: 0 0 16px;
    }

    p {
      font-size: clamp(1.05rem, 2.5vw, 1.28rem);
      line-height: 1.7;
    }

    .love-line {
      color: #ffe1eb;
      font-style: italic;
    }

    .game-box {
      margin-top: 28px;
      padding: 22px;
      border-radius: 22px;
      background: rgba(255,255,255,0.14);
    }

    button {
      margin: 9px;
      border: none;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 1rem;
      font-weight: bold;
      color: #6d123f;
      background: linear-gradient(135deg, #fff0f5, #ffc2d5);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.18s ease;
    }

    button:hover { transform: translateY(-2px); }

    .touch-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .touch-controls button {
      min-width: 82px;
      padding: 15px 20px;
      font-size: 1.15rem;
      touch-action: manipulation;
      user-select: none;
    }

    input {
      width: 100%;
      max-width: 440px;
      padding: 15px 17px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      outline: none;
      text-align: center;
      background: rgba(255,255,255,0.95);
      color: #4d062b;
      margin-top: 10px;
    }

    .feedback {
      min-height: 30px;
      margin-top: 14px;
      color: #ffd5e3;
      font-size: 1rem;
    }

    .progress {
      margin-top: 18px;
      font-size: 0.92rem;
      opacity: 0.8;
    }

    .drag-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .draggable {
      background: rgba(255,255,255,0.9);
      color: #6d123f;
      padding: 14px;
      border-radius: 18px;
      font-weight: bold;
      cursor: grab;
      margin: 8px;
    }

    .drop-zone {
      min-height: 150px;
      border: 2px dashed rgba(255,255,255,0.55);
      border-radius: 22px;
      padding: 12px;
    }

    .sentence-piece {
      display: inline-block;
      background: rgba(255,255,255,0.9);
      color: #6d123f;
      padding: 12px 16px;
      margin: 7px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
    }

    .selected-row {
      min-height: 58px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.12);
      margin-top: 15px;
    }

    .dodge-area {
      position: relative;
      width: 100%;
      max-width: 620px;
      height: 330px;
      margin: 18px auto;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      overflow: hidden;
    }

    .player {
      position: absolute;
      left: 280px;
      top: 270px;
      font-size: 2rem;
    }

    .falling {
      position: absolute;
      font-size: 1.8rem;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(8, 38px);
      gap: 7px;
      justify-content: center;
      margin: 20px auto;
    }

    .letter {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.22);
      color: white;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .letter.selected {
      background: #ffe1eb;
      color: #6d123f;
    }

    .final-heart {
      font-size: 4rem;
      animation: pulse 1.3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.13); }
    }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 0.9s ease-out forwards;
      z-index: 3;
    }

    @keyframes sparkle {
      from { opacity: 1; transform: scale(0.2); }
      to { opacity: 0; transform: translateY(-38px) scale(1.7); }
    }

    @media (max-width: 600px) {
      .card { padding: 24px 18px; }
      .drag-area { grid-template-columns: 1fr; }
      .word-grid {
        grid-template-columns: repeat(8, 30px);
        gap: 5px;
      }
      .letter {
        width: 30px;
        height: 30px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <div class="heart-rain" id="heartRain"></div>

  <main class="page">
    <section class="card" id="card">
      <div class="small-title">Uusi haaste Teealle</div>
      <h1>Hei rakas ❤️</h1>
      <p>
        Tällä kertaa tehtävät ovat erilaisia. Ei samoja lukkoja eikä samoja muistipelejä.
        Jokainen viesti aukeaa uudella tavalla.
      </p>
      <p class="love-line">
        Koska sinä ansaitset aina uuden pienen yllätyksen.
      </p>
      <button onclick="startGame()">Aloita uusi haaste</button>
    </section>
  </main>

  <script>
    const pages = [
      {
        title: "Järjestä tärkeimmät",
        text: "Minulle rakkaus ei ole vain yksi asia. Se on monta pientä asiaa, jotka yhdessä tekevät meistä meidät.",
        game: "dragDrop"
      },
      {
        title: "Rakenna lause",
        text: "Joskus oikeat sanat ovat olemassa, mutta ne pitää vain saada oikeaan järjestykseen. Niin kuin elämässäkin.",
        game: "sentence"
      },
      {
        title: "Suojele sydäntä",
        text: "Välillä elämä heittelee kaikkea päälle. Silti minä haluan suojella sitä, mikä on meille tärkeää.",
        game: "dodge"
      },
      {
        title: "Etsi piilotettu sana",
        text: "Kaiken hälyn keskellä on yksi sana, joka kertoo mitä sinä olet minulle.",
        game: "wordSearch"
      }
    ];

    let currentPage = 0;

    let sentenceAnswer = [];
    let dodgeInterval = null;
    let dodgeTime = 18;
    let heartsCaught = 0;
    let playerX = 280;
    let dodgeStarted = false;

    let selectedLetters = "";

    function startGame() {
      currentPage = 0;
      renderPage();
    }

    function renderPage() {
      clearInterval(dodgeInterval);

      const item = pages[currentPage];
      const card = document.getElementById("card");

      card.innerHTML = `
        <div class="small-title">Sivu ${currentPage + 1} / ${pages.length}</div>
        <h2>${item.title} ❤️</h2>
        <p>${item.text}</p>
        <div class="game-box" id="gameBox"></div>
        <div class="progress">Ratkaise peli, niin seuraava viesti aukeaa.</div>
      `;

      if (item.game === "dragDrop") renderDragDrop();
      if (item.game === "sentence") renderSentenceGame();
      if (item.game === "dodge") renderDodgeGame();
      if (item.game === "wordSearch") renderWordSearch();
    }

    function renderDragDrop() {
      document.getElementById("gameBox").innerHTML = `
        <p>Raahaa asiat oikeisiin laatikoihin.</p>

        <div>
          <div class="draggable" draggable="true" data-type="meidan" ondragstart="drag(event)">Yhteinen tulevaisuus</div>
          <div class="draggable" draggable="true" data-type="meidan" ondragstart="drag(event)">Fami</div>
          <div class="draggable" draggable="true" data-type="ei" ondragstart="drag(event)">Luovuttaminen</div>
          <div class="draggable" draggable="true" data-type="meidan" ondragstart="drag(event)">Toistemme tukeminen</div>
          <div class="draggable" draggable="true" data-type="ei" ondragstart="drag(event)">Yksin jääminen</div>
          <div class="draggable" draggable="true" data-type="meidan" ondragstart="drag(event)">Rakkaus arjessa</div>
        </div>

        <div class="drag-area">
          <div>
            <h3>Meidän juttuja ❤️</h3>
            <div class="drop-zone" id="meidan" ondragover="allowDrop(event)" ondrop="drop(event, 'meidan')"></div>
          </div>

          <div>
            <h3>Ei meidän tie 💔</h3>
            <div class="drop-zone" id="ei" ondragover="allowDrop(event)" ondrop="drop(event, 'ei')"></div>
          </div>
        </div>

        <button onclick="checkDragDrop()">Tarkista</button>
        <div class="feedback" id="feedback"></div>
      `;
    }

    function drag(event) {
      event.dataTransfer.setData("text", event.target.outerHTML);
      event.dataTransfer.setData("type", event.target.dataset.type);
      event.dataTransfer.setData("id", Math.random());
      event.target.classList.add("dragging");
    }

    function allowDrop(event) {
      event.preventDefault();
    }

    function drop(event, zoneType) {
      event.preventDefault();

      const dragging = document.querySelector(".dragging");
      if (!dragging) return;

      event.currentTarget.appendChild(dragging);
      dragging.classList.remove("dragging");
    }

    function checkDragDrop() {
      const zones = ["meidan", "ei"];
      let correct = true;

      zones.forEach(zoneId => {
        const zone = document.getElementById(zoneId);
        const items = zone.querySelectorAll(".draggable");

        items.forEach(item => {
          if (item.dataset.type !== zoneId) {
            correct = false;
          }
        });
      });

      const totalPlaced =
        document.getElementById("meidan").querySelectorAll(".draggable").length +
        document.getElementById("ei").querySelectorAll(".draggable").length;

      if (correct && totalPlaced === 6) {
        document.getElementById("feedback").textContent = "Juuri noin. Meidän tie löytyi ❤️";
        createSparkles();
        setTimeout(nextPage, 900);
      } else {
        document.getElementById("feedback").textContent =
          "Ei ihan vielä. Kaikki pitää raahata oikeisiin laatikoihin 😄";
      }
    }

    function renderSentenceGame() {
      sentenceAnswer = [];

      const pieces = ["sinut", "valitsisin", "aina", "uudelleen"];
      const shuffled = pieces.sort(() => Math.random() - 0.5);

      let html = "";
      shuffled.forEach(word => {
        html += `<span class="sentence-piece" onclick="chooseWord('${word}', this)">${word}</span>`;
      });

      document.getElementById("gameBox").innerHTML = `
        <p>Klikkaa sanat oikeassa järjestyksessä.</p>
        <div>${html}</div>

        <div class="selected-row" id="selectedSentence"></div>

        <button onclick="resetSentence()">Tyhjennä</button>
        <button onclick="checkSentence()">Tarkista lause</button>

        <div class="feedback" id="feedback"></div>
      `;
    }

    function chooseWord(word, element) {
      sentenceAnswer.push(word);
      element.style.opacity = "0.35";
      element.style.pointerEvents = "none";
      document.getElementById("selectedSentence").textContent = sentenceAnswer.join(" ");
    }

    function resetSentence() {
      renderSentenceGame();
    }

    function checkSentence() {
      const correct = ["valitsisin", "sinut", "aina", "uudelleen"];

      if (sentenceAnswer.join(" ") === correct.join(" ")) {
        document.getElementById("feedback").textContent = "Täydellinen lause ❤️";
        createSparkles();
        setTimeout(nextPage, 900);
      } else {
        document.getElementById("feedback").textContent =
          "Melkein, mutta sanat eivät ole vielä oikeassa järjestyksessä ❤️";
      }
    }

    function renderDodgeGame() {
      clearInterval(dodgeInterval);
      document.removeEventListener("keydown", moveDodgePlayer);

      dodgeTime = 18;
      heartsCaught = 0;
      dodgeStarted = false;

      document.getElementById("gameBox").innerHTML = `
        <p>
          Liikuta sydäntä kosketusnapeilla. Kerää 6 sydäntä ja vältä särkyneitä sydämiä.
        </p>

        <div class="dodge-area" id="dodgeArea">
          <div class="player" id="player">❤️</div>
        </div>

        <div class="touch-controls">
          <button type="button" onclick="moveTouchPlayer(-45)">⬅️</button>
          <button type="button" onclick="centerPlayer()">❤️</button>
          <button type="button" onclick="moveTouchPlayer(45)">➡️</button>
        </div>

        <div class="feedback" id="feedback">Aika: 18 | Kerätty: 0 / 6</div>
        <button id="startDodgeButton" onclick="startDodge()">Aloita</button>
      `;

      centerPlayer();
    }

    function startDodge() {
      if (dodgeStarted) return;
      dodgeStarted = true;

      const startButton = document.getElementById("startDodgeButton");
      if (startButton) {
        startButton.disabled = true;
        startButton.textContent = "Peli käynnissä ❤️";
      }

      // Näppäimistö toimii edelleen tietokoneella, mutta puhelin käyttää kosketusnappeja.
      document.addEventListener("keydown", moveDodgePlayer);

      dodgeInterval = setInterval(() => {
        dodgeTime--;
        spawnFallingItem();
        updateDodgeFeedback();

        if (dodgeTime <= 0) {
          endDodge(false);
        }
      }, 800);
    }

    function moveTouchPlayer(amount) {
      const area = document.getElementById("dodgeArea");
      const player = document.getElementById("player");
      if (!area || !player) return;

      playerX += amount;
      playerX = Math.max(0, Math.min(area.clientWidth - 40, playerX));
      player.style.left = playerX + "px";
    }

    function centerPlayer() {
      const area = document.getElementById("dodgeArea");
      const player = document.getElementById("player");
      if (!area || !player) return;

      playerX = area.clientWidth / 2 - 20;
      player.style.left = playerX + "px";
    }

    function moveDodgePlayer(event) {
      const area = document.getElementById("dodgeArea");
      const player = document.getElementById("player");
      if (!area || !player) return;

      if (event.key === "ArrowLeft") playerX -= 25;
      if (event.key === "ArrowRight") playerX += 25;

      playerX = Math.max(0, Math.min(area.clientWidth - 40, playerX));
      player.style.left = playerX + "px";
    }

    function spawnFallingItem() {
      const area = document.getElementById("dodgeArea");
      if (!area) return;

      const item = document.createElement("div");
      item.className = "falling";

      const good = Math.random() > 0.35;
      item.textContent = good ? "💖" : "💔";
      item.dataset.good = good;

      item.style.left = Math.random() * (area.clientWidth - 40) + "px";
      item.style.top = "0px";
      area.appendChild(item);

      let y = 0;

      const fall = setInterval(() => {
        y += 18;
        item.style.top = y + "px";

        const itemX = parseInt(item.style.left);
        const player = document.getElementById("player");

        if (player && y > 250 && Math.abs(itemX - playerX) < 38) {
          clearInterval(fall);
          item.remove();

          if (good) {
            heartsCaught++;
            createSparkles();

            if (heartsCaught >= 6) {
              endDodge(true);
            }
          } else {
            endDodge(false);
          }

          updateDodgeFeedback();
        }

        if (y > 330) {
          clearInterval(fall);
          item.remove();
        }
      }, 80);
    }

    function updateDodgeFeedback() {
      const feedback = document.getElementById("feedback");
      if (feedback) {
        feedback.textContent = "Aika: " + dodgeTime + " | Kerätty: " + heartsCaught + " / 6";
      }
    }

    function endDodge(won) {
      clearInterval(dodgeInterval);
      dodgeStarted = false;
      document.removeEventListener("keydown", moveDodgePlayer);

      if (won) {
        document.getElementById("feedback").textContent = "Sydän suojeltu ❤️";
        createSparkles();
        setTimeout(nextPage, 900);
      } else {
        document.getElementById("feedback").textContent =
          "Voi ei 😄 Yritetään tätä uudelleen.";
        setTimeout(renderDodgeGame, 1200);
      }
    }

    function renderWordSearch() {
      selectedLetters = "";

      const letters = [
        "K","O","T","I","X","A","M","P",
        "S","Y","D","A","N","L","Q","R",
        "T","U","R","V","A","A","E","Z",
        "N","A","U","R","U","S","K","I",
        "F","A","M","I","B","C","D","E",
        "R","A","K","A","S","T","A","N"
      ];

      let html = "";
      letters.forEach(letter => {
        html += `<div class="letter" onclick="selectLetter(this)">${letter}</div>`;
      });

      document.getElementById("gameBox").innerHTML = `
        <p>
          Etsi ja klikkaa kirjaimet, jotka muodostavat sanan:
          <br><b>RAKASTAN</b>
        </p>

        <div class="word-grid">${html}</div>

        <p>Valittu: <span id="chosenLetters"></span></p>
        <button onclick="resetWordSearch()">Tyhjennä</button>
        <button onclick="checkWordSearch()">Tarkista</button>

        <div class="feedback" id="feedback"></div>
      `;
    }

    function selectLetter(element) {
      selectedLetters += element.textContent;
      element.classList.add("selected");
      element.style.pointerEvents = "none";
      document.getElementById("chosenLetters").textContent = selectedLetters;
    }

    function resetWordSearch() {
      renderWordSearch();
    }

    function checkWordSearch() {
      if (selectedLetters === "RAKASTAN") {
        document.getElementById("feedback").textContent = "Niin minä teen. Rakastan sinua ❤️";
        createSparkles();
        setTimeout(nextPage, 1000);
      } else {
        document.getElementById("feedback").textContent =
          "Ei vielä oikea sana. Tyhjennä ja kokeile uudelleen ❤️";
      }
    }

    function nextPage() {
      clearInterval(dodgeInterval);
      document.removeEventListener("keydown", moveDodgePlayer);

      currentPage++;

      if (currentPage < pages.length) {
        renderPage();
      } else {
        renderFinalPage();
      }
    }

    function renderFinalPage() {
      const card = document.getElementById("card");

      card.innerHTML = `
        <div class="small-title">Uusi haaste läpäisty</div>
        <div class="final-heart">❤️</div>
        <h2>Teea, sinä pääsit taas loppuun.</h2>
        <p>
          Halusin tehdä sinulle jotain, missä pitää vähän yrittää, koska sinäkin olet
          sellainen ihminen, jonka eteen haluan nähdä vaivaa.
        </p>
        <p>
          Rakastan sinun herkkyyttäsi, huumoriasi, lämpöäsi ja sitä, että sinun kanssasi
          elämä ei tunnu vain selviytymiseltä, vaan rakentamiselta.
        </p>
        <p class="love-line">
          Minä rakastan sinua. En vain sanoina, vaan valintana. Uudelleen ja uudelleen. ❤️
        </p>
        <button onclick="startGame()">Pelaa uudelleen</button>
      `;

      createSparkles();
    }

    function createHeartRain() {
      const container = document.getElementById("heartRain");
      const hearts = ["❤️", "💕", "💗", "💖", "💘", "🌹"];

      for (let i = 0; i < 48; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 14 + Math.random() * 26 + "px";
        heart.style.animationDuration = 7 + Math.random() * 9 + "s";
        heart.style.animationDelay = Math.random() * 9 + "s";
        container.appendChild(heart);
      }
    }

    function createSparkles() {
      for (let i = 0; i < 24; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = 20 + Math.random() * 60 + "vw";
        sparkle.style.top = 25 + Math.random() * 50 + "vh";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 900);
      }
    }

    createHeartRain();
  </script>
</body>
</html>
