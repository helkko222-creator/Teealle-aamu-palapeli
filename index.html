<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Teealle ❤️ Pieni lupauspeli</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --dark: #170015;
      --deep: #42113a;
      --rose: #a93263;
      --pink: #ffb8d0;
      --soft: #ffe8f0;
      --card: rgba(255,255,255,0.14);
      --line: rgba(255,255,255,0.28);
      --textDark: #5c1039;
    }

    html, body { width: 100%; min-height: 100%; overflow-x: hidden; }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,0.24), transparent 28%),
        radial-gradient(circle at 88% 88%, rgba(255,180,215,0.23), transparent 32%),
        linear-gradient(135deg, var(--dark), var(--deep) 48%, var(--rose));
      color: white;
    }

    .heart-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      top: -10vh;
      animation: fall linear infinite;
      text-shadow: 0 0 12px rgba(255,255,255,0.45);
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: max(16px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
    }

    .card {
      width: min(880px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(18px, 5vw, 34px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.36);
      backdrop-filter: blur(16px);
      text-align: center;
      animation: appear 0.55s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .small-title {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.78rem;
      opacity: 0.84;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2.05rem, 10vw, 4.15rem);
      margin: 0 0 16px;
      line-height: 1.02;
    }

    h2 {
      font-size: clamp(1.55rem, 7vw, 2.7rem);
      margin: 0 0 16px;
      line-height: 1.08;
    }

    p {
      font-size: clamp(1.02rem, 4.2vw, 1.22rem);
      line-height: 1.62;
      margin: 12px auto;
      max-width: 720px;
    }

    .love-line { color: var(--soft); font-style: italic; }

    .game-box {
      margin-top: 22px;
      padding: clamp(14px, 4vw, 22px);
      border-radius: 24px;
      background: rgba(255,255,255,0.13);
      overflow: hidden;
    }

    button {
      margin: 8px;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      min-height: 48px;
      font-size: 1rem;
      font-weight: bold;
      color: var(--textDark);
      background: linear-gradient(135deg, #fff4f8, #ffc5d9);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.23);
      transition: transform 0.16s ease, opacity 0.16s ease;
      touch-action: manipulation;
    }

    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .feedback {
      min-height: 32px;
      margin-top: 14px;
      color: #ffd7e5;
      font-size: 1rem;
      font-weight: bold;
    }

    .progress { margin-top: 18px; font-size: 0.92rem; opacity: 0.82; }

    .choice-grid, .sort-list, .promise-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .choice, .sort-card, .promise-card, .step-card {
      border-radius: 20px;
      background: rgba(255,255,255,0.92);
      color: var(--textDark);
      padding: 16px 12px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      min-height: 78px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
      touch-action: manipulation;
    }

    .choice.selected, .promise-card.selected, .sort-card.good {
      outline: 4px solid #ffe2ec;
      background: #ffc8da;
    }

    .sort-card.bad { opacity: 0.35; text-decoration: line-through; }

    .path {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 18px auto 0;
      max-width: 650px;
    }

    .step-card.locked { opacity: 0.62; }
    .step-card.done { background: #ffd7e5; pointer-events: none; }

    .hold-wrap {
      position: relative;
      width: min(260px, 70vw);
      aspect-ratio: 1 / 1;
      margin: 18px auto;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.28);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .hold-fill {
      position: absolute;
      inset: auto 0 0 0;
      height: 0%;
      background: rgba(255,224,236,0.65);
      transition: height 0.08s linear;
    }

    .hold-button {
      position: relative;
      z-index: 2;
      width: 76%;
      height: 76%;
      border-radius: 999px;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(255,255,255,0.92);
      color: var(--textDark);
      font-weight: bold;
      box-shadow: 0 14px 32px rgba(0,0,0,0.22);
      cursor: pointer;
      user-select: none;
      touch-action: none;
    }

    .final-heart { font-size: 4rem; animation: pulse 1.25s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 0.9s ease-out forwards;
      z-index: 3;
    }

    @keyframes sparkle {
      from { opacity: 1; transform: scale(0.2); }
      to { opacity: 0; transform: translateY(-38px) scale(1.7); }
    }

    @media (max-width: 650px) {
      .page { align-items: flex-start; }
      .card { border-radius: 24px; }
      .choice-grid, .sort-list, .promise-grid { grid-template-columns: 1fr; }
      .choice, .sort-card, .promise-card, .step-card { min-height: 68px; font-size: 0.98rem; }
      button { width: calc(100% - 16px); max-width: 390px; }
      .heart:nth-child(n+26) { display: none; }
    }
  </style>
</head>
<body>
  <div class="heart-rain" id="heartRain"></div>

  <main class="page">
    <section class="card" id="card">
      <div class="small-title">Teealle</div>
      <h1>Hei rakas ❤️</h1>
      <p>
        Tein sinulle uuden pienen pelin. Ei siksi, että yksi peli korjaisi kaiken,
        vaan siksi että haluan näyttää sinulle: minä välitän, minä yritän ja minä haluan oppia.
      </p>
      <p class="love-line">
        Haluan olla sinulle enemmän turva kuin selitys. En täydellinen, mutta enemmän läsnä.
      </p>
      <button onclick="startGame()">Aloita pieni lupauspeli</button>
    </section>
  </main>

  <script>
    const pages = [
      {
        title: "Rakenna turvapolku",
        text: "Kun meille tulee vaikea hetki, minun ei tarvitse voittaa keskustelua. Minun pitää löytää takaisin sinun luo.",
        game: "path"
      },
      {
        title: "Valitse pehmeämmät sanat",
        text: "Ahdistus ei saa tehdä minusta kylmää. Voin opetella sanoja, jotka rauhoittavat eikä satuta lisää.",
        game: "sortWords"
      },
      {
        title: "Lupauskortit",
        text: "Minun rakkaus ei saa näkyä vain silloin kun kaikki on helppoa. Sen pitää näkyä myös siinä, miten pysähdyn.",
        game: "promises"
      },
      {
        title: "Pidä hetki kiinni",
        text: "Joskus tärkeintä ei ole keksiä täydellistä lausetta, vaan pysyä hetki paikallaan ja olla lempeä.",
        game: "hold"
      }
    ];

    let currentPage = 0;
    let pathStep = 0;
    let goodWords = 0;
    let selectedPromises = 0;
    let holdTimer = null;
    let holdProgress = 0;

    function startGame() {
      currentPage = 0;
      renderPage();
    }

    function renderPage() {
      clearInterval(holdTimer);
      const item = pages[currentPage];
      const card = document.getElementById("card");
      card.innerHTML = `
        <div class="small-title">Sivu ${currentPage + 1} / ${pages.length}</div>
        <h2>${item.title} ❤️</h2>
        <p>${item.text}</p>
        <div class="game-box" id="gameBox"></div>
        <div class="progress">Ratkaise pieni tehtävä, niin seuraava viesti aukeaa.</div>
      `;

      if (item.game === "path") renderPathGame();
      if (item.game === "sortWords") renderSortWordsGame();
      if (item.game === "promises") renderPromiseGame();
      if (item.game === "hold") renderHoldGame();
    }

    function renderPathGame() {
      pathStep = 0;
      const steps = [
        "Pysähdyn ennen kuin puolustaudun",
        "Muistan, että tunne tarvitsee turvaa",
        "Kysyn rauhallisesti mitä tarvitset nyt",
        "Tulen lähemmäs enkä kauemmas"
      ];

      document.getElementById("gameBox").innerHTML = `
        <p>Paina kortit järjestyksessä ylhäältä alas.</p>
        <div class="path">
          ${steps.map((s, i) => `<div class="step-card ${i ? 'locked' : ''}" onclick="tapPathStep(${i}, this)">${i + 1}. ${s}</div>`).join("")}
        </div>
        <div class="feedback" id="feedback">Aloita ensimmäisestä askeleesta.</div>
      `;
    }

    function tapPathStep(index, el) {
      if (index !== pathStep) {
        document.getElementById("feedback").textContent = "Ei kiirettä. Turva rakentuu askel kerrallaan ❤️";
        return;
      }
      el.classList.add("done");
      el.classList.remove("locked");
      pathStep++;
      createSparkles();
      const cards = document.querySelectorAll(".step-card");
      if (cards[pathStep]) cards[pathStep].classList.remove("locked");
      document.getElementById("feedback").textContent = "Hyvä. Askel " + pathStep + " / 4";
      if (pathStep >= 4) {
        document.getElementById("feedback").textContent = "Tätä polkua minä haluan opetella kulkemaan sinun kanssa ❤️";
        setTimeout(nextPage, 950);
      }
    }

    function renderSortWordsGame() {
      goodWords = 0;
      const words = [
        { text: "olen tässä", good: true },
        { text: "minä kuuntelen", good: true },
        { text: "sinun tunne on tärkeä", good: true },
        { text: "tule lähemmäs", good: true },
        { text: "älä nyt aloita", good: false },
        { text: "unohda koko juttu", good: false },
        { text: "ei se noin mennyt", good: false },
        { text: "minä en jaksa tätä", good: false }
      ].sort(() => Math.random() - 0.5);

      document.getElementById("gameBox").innerHTML = `
        <p>Napauta neljä lausetta, jotka rakentavat turvaa.</p>
        <div class="sort-list">
          ${words.map(w => `<div class="sort-card" onclick="tapWord(this)" data-good="${w.good}">${w.text}</div>`).join("")}
        </div>
        <div class="feedback" id="feedback">Valittu: 0 / 4</div>
      `;
    }

    function tapWord(el) {
      if (el.classList.contains("good") || el.classList.contains("bad")) return;
      if (el.dataset.good === "true") {
        el.classList.add("good");
        goodWords++;
        createSparkles();
        document.getElementById("feedback").textContent = "Valittu: " + goodWords + " / 4";
        if (goodWords >= 4) {
          document.getElementById("feedback").textContent = "Nämä sanat haluan ottaa mukaan oikeaan elämään ❤️";
          setTimeout(nextPage, 950);
        }
      } else {
        el.classList.add("bad");
        document.getElementById("feedback").textContent = "Tuo on se vanha muuri. Valitsen pehmeämmän suunnan ❤️";
      }
    }

    function renderPromiseGame() {
      selectedPromises = 0;
      const promises = [
        "En naura sinun turvattomuudelle",
        "En jätä sinua yksin tunteen kanssa",
        "Sanon ääneen, että valitsen sinut",
        "Pyydän anteeksi ilman selittelyä",
        "Muistan koskettaa lempeämmin",
        "Palaan takaisin keskusteluun"
      ];

      document.getElementById("gameBox").innerHTML = `
        <p>Valitse kolme lupausta, jotka haluat avata. Kaikki ovat oikeita.</p>
        <div class="promise-grid">
          ${promises.map(p => `<div class="promise-card" onclick="choosePromise(this)">${p}</div>`).join("")}
        </div>
        <div class="feedback" id="feedback">Valittu: 0 / 3</div>
      `;
    }

    function choosePromise(el) {
      if (el.classList.contains("selected")) return;
      el.classList.add("selected");
      selectedPromises++;
      createSparkles();
      document.getElementById("feedback").textContent = "Valittu: " + selectedPromises + " / 3";
      if (selectedPromises >= 3) {
        document.getElementById("feedback").textContent = "Nämä eivät ole vain kortteja. Nämä ovat asioita, joita haluan harjoitella ❤️";
        setTimeout(nextPage, 1050);
      }
    }

    function renderHoldGame() {
      holdProgress = 0;
      document.getElementById("gameBox").innerHTML = `
        <p>Pidä sydäntä painettuna, kunnes rauha täyttyy.</p>
        <div class="hold-wrap">
          <div class="hold-fill" id="holdFill"></div>
          <div class="hold-button" id="holdButton">Pidä tästä kiinni ❤️</div>
        </div>
        <div class="feedback" id="feedback">Rauha: 0%</div>
      `;

      const btn = document.getElementById("holdButton");
      btn.addEventListener("pointerdown", startHold);
      btn.addEventListener("pointerup", stopHold);
      btn.addEventListener("pointerleave", stopHold);
      btn.addEventListener("pointercancel", stopHold);
    }

    function startHold(e) {
      e.preventDefault();
      clearInterval(holdTimer);
      holdTimer = setInterval(() => {
        holdProgress = Math.min(100, holdProgress + 2);
        document.getElementById("holdFill").style.height = holdProgress + "%";
        document.getElementById("feedback").textContent = "Rauha: " + holdProgress + "%";
        if (holdProgress >= 100) {
          clearInterval(holdTimer);
          document.getElementById("feedback").textContent = "Minä pysyn tässä. En karkaa vaikeaa hetkeä ❤️";
          createSparkles();
          setTimeout(nextPage, 1000);
        }
      }, 55);
    }

    function stopHold() {
      clearInterval(holdTimer);
      if (holdProgress > 0 && holdProgress < 100) {
        holdProgress = Math.max(0, holdProgress - 6);
        document.getElementById("holdFill").style.height = holdProgress + "%";
        document.getElementById("feedback").textContent = "Rauha: " + holdProgress + "% — pidä vielä hetki ❤️";
      }
    }

    function nextPage() {
      clearInterval(holdTimer);
      currentPage++;
      if (currentPage < pages.length) renderPage();
      else renderFinalPage();
    }

    function renderFinalPage() {
      const card = document.getElementById("card");
      card.innerHTML = `
        <div class="small-title">Peli läpäisty</div>
        <div class="final-heart">❤️</div>
        <h2>Teea, minä rakastan sinua.</h2>
        <p>
          Anteeksi niistä hetkistä, kun olen ollut liian kova, liian poissa tai liian puolustuskannalla.
          Sinun ei pitäisi joutua taistelemaan yksin sen puolesta, että tulet nähdyksi ja turvatuksi.
        </p>
        <p>
          Minä en lupaa olla täydellinen. Lupaan kuitenkin opetella pysähtymään ennen kuin satutan sanoilla,
          kuuntelemaan ennen kuin selitän ja tulemaan lähemmäs silloin, kun vanha minä menisi kauemmas.
        </p>
        <p class="love-line">
          Sinä olet minun rakas Teea. Minä valitsen sinut arjessa, vaikeissa hetkissä ja niissä pienissä hetkissä,
          joissa rakkaus oikeasti näytetään. ❤️
        </p>
        <button onclick="startGame()">Pelaa uudelleen</button>
      `;
      createSparkles();
    }

    function createHeartRain() {
      const container = document.getElementById("heartRain");
      const hearts = ["❤️", "💕", "💗", "💖", "🌹"];
      const amount = window.innerWidth < 650 ? 26 : 44;
      for (let i = 0; i < amount; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 13 + Math.random() * 24 + "px";
        heart.style.animationDuration = 7 + Math.random() * 9 + "s";
        heart.style.animationDelay = Math.random() * 9 + "s";
        container.appendChild(heart);
      }
    }

    function createSparkles() {
      for (let i = 0; i < 22; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = 16 + Math.random() * 68 + "vw";
        sparkle.style.top = 22 + Math.random() * 56 + "vh";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 900);
      }
    }

    createHeartRain();
  </script>
</body>
</html>
